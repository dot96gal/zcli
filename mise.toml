[tools]
zig = "0.16.0"
zls = "0.16.0"

[tasks.fmt]
description = "format"
run = "zig fmt src/"

[tasks."fmt-check"]
description = "format check"
run = "zig fmt --check src/"

[tasks.lint]
description = "lint"
run = "bash scripts/lint.sh"

[tasks.build]
description = "build"
run = "zig build --summary all"

[tasks.test]
description = "test"
run = "zig build test --summary all"

# 呼び出し例:
#   mise run example-basic -- greet --name Alice --count 3 --excited
#   mise run example-basic -- help greet
[tasks."example-basic"]
description = "run basic example (no cancellation)"
run = "zig build run-basic --summary all -- $@"

# 呼び出し例:
#   mise run example-signal -- greet --name Alice
[tasks."example-signal"]
description = "run signal cancel example"
run = "zig build run-signal --summary all -- $@"

[tasks.build-docs]
description = "build API documentation"
run = "zig build docs --summary all"

[tasks.serve-docs]
description = "serve API documentation"
depends = ["build-docs"]
run = "npx --yes serve zig-out/docs"

[tasks.release]
description = "bump version, commit, tag, and push"
run = "bash scripts/release.sh $@"
