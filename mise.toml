[tools]
zig = "0.16.0"
zls = "0.16.0"

[tasks.fmt]
description = "format"
run = "zig fmt src/"

[tasks."fmt-check"]
description = "format check"
run = "zig fmt --check src/"

[tasks.build]
description = "build"
run = "zig build --summary all"

[tasks.test]
description = "test"
run = "zig build test --summary all"

# 呼び出し例:
#   mise run example
#   mise run example -- greet --name Alice --count 3 --excited
#   mise run example -- help greet
[tasks.example]
description = "run example"
run = "zig build run --summary all -- $@"

[tasks.build-docs]
description = "build API documentation"
run = "zig build docs --summary all"

[tasks.serve-docs]
description = "serve API documentation"
depends = ["build-docs"]
run = "npx --yes serve zig-out/docs"

